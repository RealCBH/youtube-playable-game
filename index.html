<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Boost</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PHONE SIZE */
canvas {
  width: 360px;
  height: 640px;
  display:block;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* FIXED PHONE SIZE */
canvas.width = 360;
canvas.height = 640;

/* ================= STATE ================= */
let state = "menu";
let gameOverType = "";

/* ================= SHIP ================= */
const ship = {
  x: canvas.width/2,
  y: canvas.height/2,
  vy: 0
};

/* ================= STATS ================= */
let fuel = 120;
let heat = 0;
let runMoney = 0;
let totalMoney = 0;
let distance = 0;

/* upgrades */
let fuelLevel = 0;
let thrustLevel = 0;
let moneyLevel = 0;

let fuelCap = 120;
let thrustPower = 0.28;
let moneyMulti = 1;

/* ================= INPUT ================= */
let holding = false;
window.addEventListener("mousedown", () => holding = true);
window.addEventListener("mouseup", () => holding = false);
window.addEventListener("touchstart", () => holding = true);
window.addEventListener("touchend", () => holding = false);

/* ================= WORLD ================= */
const stars = Array.from({length:250}, () => ({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height*2,
  s: Math.random()*2
}));

/* ================= EXPLOSION ================= */
let pieces = [];
let exploded = false;

/* ================= UPDATE ================= */
function update(){

if(state === "playing"){

  if(holding && fuel > 0 && heat < 100){
    ship.vy -= thrustPower;
    fuel -= 0.32;
    heat += 0.7;
  }

  if(!holding){
    heat -= 0.45;
  }

  heat = Math.max(0, Math.min(100, heat));
  fuel = Math.max(0, fuel);

  ship.vy += 0.14;
  ship.vy *= 0.98;
  ship.y += ship.vy;

  ship.y = Math.max(30, Math.min(canvas.height-30, ship.y));

  distance += Math.max(0, -ship.vy)*0.05;
  runMoney = Math.floor(distance/10) * moneyMulti;

  stars.forEach(s=>{
    s.y += 2;
    if(s.y > canvas.height*2) s.y = 0;
  });

  if(heat >= 100){
    gameOverType = "heat";
    explode();
  }

  if(fuel <= 0){
    gameOverType = "fuel";
    explode();
  }
}

pieces.forEach(p=>{
  p.x += p.vx;
  p.y += p.vy;
  p.vy += 0.1;
});

}

/* ================= EXPLODE ================= */
function explode(){
if(exploded) return;
exploded = true;
state = "gameover";

totalMoney += runMoney;

for(let i=0;i<7;i++){
  pieces.push({
    x: ship.x,
    y: ship.y,
    vx: (Math.random()-0.5)*7,
    vy: (Math.random()-0.5)*7
  });
}
}

/* ================= DRAW ================= */
function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* stars */
ctx.fillStyle="white";
stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s));

/* PLAY */
if(state === "playing"){

  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.moveTo(ship.x, ship.y - 22);
  ctx.lineTo(ship.x - 14, ship.y + 18);
  ctx.lineTo(ship.x + 14, ship.y + 18);
  ctx.closePath();
  ctx.fill();

  if(holding && fuel > 0){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.moveTo(ship.x, ship.y + 18);
    ctx.lineTo(ship.x - 6, ship.y + 35);
    ctx.lineTo(ship.x + 6, ship.y + 35);
    ctx.fill();
  }

  ctx.fillStyle="gray";
  ctx.fillRect(20, canvas.height/2-100, 20, 200);

  ctx.fillStyle="red";
  ctx.fillRect(20, canvas.height/2+100-(heat*2), 20, heat*2);

  ctx.fillStyle="gray";
  ctx.fillRect(canvas.width-40, canvas.height/2-100, 20, 200);

  ctx.fillStyle="green";
  ctx.fillRect(canvas.width-40, canvas.height/2+100-(fuel/fuelCap)*200, 20,(fuel/fuelCap)*200);

  ctx.fillStyle="white";
  ctx.fillText("Run: $" + runMoney,20,30);
}

/* MENU */
if(state === "menu"){

ctx.fillStyle="white";
ctx.textAlign="center";

ctx.font="30px Arial";
ctx.fillText("SPACE BOOST",canvas.width/2,80);

ctx.font="18px Arial";
ctx.fillText("Money: $" + totalMoney,canvas.width/2,110);

/* UPGRADE BOXES */
drawBox(20,150,"Fuel Capacity",fuelLevel);
drawBox(20,300,"Thrust Power",thrustLevel);
drawBox(180,150,"Money Multiplier",moneyLevel);

}

/* GAME OVER */
if(state === "gameover"){

ctx.textAlign="center";
ctx.fillStyle="white";
ctx.font="30px Arial";

ctx.fillText(gameOverType === "fuel" ? "OUT OF FUEL" : "OVERHEATED",
canvas.width/2,canvas.height/2);

ctx.font="20px Arial";
ctx.fillText("Run Money: $" + runMoney,canvas.width/2,canvas.height/2+40);
ctx.fillText("Click to return",canvas.width/2,canvas.height/2+80);

ctx.fillStyle="orange";
pieces.forEach(p=>ctx.fillRect(p.x,p.y,6,6));

}
}

/* ================= UPGRADE SYSTEM ================= */
function cost(l){
  return Math.floor(10 * Math.pow(1.8, l));
}

function buy(type){

let lvl = type==="fuel"?fuelLevel:
          type==="thrust"?thrustLevel:
          moneyLevel;

if(totalMoney < cost(lvl) || lvl >= 5){
  return;
}

totalMoney -= cost(lvl);

if(type==="fuel"){
  fuelLevel++;
  fuelCap += 20;
}

if(type==="thrust"){
  thrustLevel++;
  thrustPower += 0.08;
}

if(type==="money"){
  moneyLevel++;
  moneyMulti += 0.5;
}
}

/* ================= DRAW BOX ================= */
function drawBox(x,y,title,level){

ctx.strokeStyle="white";
ctx.strokeRect(x,y,140,110);

ctx.fillStyle="white";
ctx.font="14px Arial";
ctx.textAlign="center";

ctx.fillText(title,x+70,y+25);
ctx.fillText("Lvl "+level+"/5",x+70,y+50);

ctx.fillStyle="green";
ctx.fillRect(x+20,y+70,100,25);

ctx.fillStyle="black";
ctx.fillText(cost(level)+"$",x+70,y+88);
}

/* ================= CLICK ================= */
window.addEventListener("mousedown", (e) => {

if(state === "menu"){
  const x = e.clientX;
  const y = e.clientY;

  if(y > 150 && y < 260 && x > 20 && x < 160) buy("fuel");
  else if(y > 300 && y < 410 && x > 20 && x < 160) buy("thrust");
  else if(y > 150 && y < 260 && x > 180 && x < 320) buy("money");
  else state = "playing";
}

if(state === "gameover"){
  reset();
  state = "menu";
}

});

/* ================= RESET ================= */
function reset(){
ship.x=canvas.width/2;
ship.y=canvas.height/2;
ship.vy=0;
fuel=120;
heat=0;
distance=0;
runMoney=0;
exploded=false;
pieces=[];
}

/* ================= LOOP ================= */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
