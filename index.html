<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ================= STATE ================= */
let state = "menu";
let gameOverType = "";
let message = "";
let messageTimer = 0;

/* ================= SHIP ================= */
const ship = {
  x: canvas.width/2,
  y: canvas.height/2,
  vy: 0,
  size: 18
};

/* ================= STATS ================= */
let fuel = 100;
let heat = 0;
let runMoney = 0;
let totalMoney = 0;
let distance = 0;

/* upgrades */
let fuelLevel = 0;
let thrustLevel = 0;
let moneyLevel = 0;

let fuelCap = 120; // slightly buffed
let thrustPower = 0.28; // slightly reduced = harder boost
let moneyMulti = 1;

/* ================= INPUT ================= */
let holding = false;
window.addEventListener("mousedown", () => holding = true);
window.addEventListener("mouseup", () => holding = false);
window.addEventListener("touchstart", () => holding = true);
window.addEventListener("touchend", () => holding = false);

/* ================= WORLD ================= */
const stars = Array.from({length:250}, () => ({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height*2,
  s: Math.random()*2
}));

/* ================= EXPLOSION ================= */
let pieces = [];
let exploded = false;

/* ================= UPDATE ================= */
function update(){

if(state === "playing"){

  /* BOOST */
  if(holding && fuel > 0 && heat < 100){
    ship.vy -= thrustPower;
    fuel -= 0.32;
    heat += 0.7; // slower overheating (requested)
  }

  if(!holding){
    heat -= 0.45;
  }

  heat = Math.max(0, Math.min(100, heat));
  fuel = Math.max(0, fuel);

  /* PHYSICS */
  ship.vy += 0.14;
  ship.vy *= 0.98;
  ship.y += ship.vy;

  /* SCREEN LIMIT (IMPORTANT ADDITION) */
  ship.y = Math.max(30, Math.min(canvas.height-30, ship.y));

  /* MONEY (RUN ONLY) */
  distance += Math.max(0, -ship.vy)*0.05;
  runMoney = Math.floor(distance/10) * moneyMulti;

  /* BACKGROUND */
  stars.forEach(s=>{
    s.y += 2;
    if(s.y > canvas.height*2) s.y = 0;
  });

  /* FAIL CONDITIONS */
  if(heat >= 100){
    gameOverType = "heat";
    explode();
  }

  if(fuel <= 0){
    gameOverType = "fuel";
    explode();
  }
}

/* explosion physics */
pieces.forEach(p=>{
  p.x += p.vx;
  p.y += p.vy;
  p.vy += 0.1;
});

/* message fade */
if(messageTimer > 0){
  messageTimer--;
  if(messageTimer === 0) message = "";
}
}

/* ================= EXPLODE ================= */
function explode(){
if(exploded) return;
exploded = true;
state = "gameover";

/* add run money to total ONLY on game end */
totalMoney += runMoney;

for(let i=0;i<7;i++){
  pieces.push({
    x: ship.x,
    y: ship.y,
    vx: (Math.random()-0.5)*7,
    vy: (Math.random()-0.5)*7
  });
}
}

/* ================= DRAW ================= */
function draw(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* stars */
ctx.fillStyle="white";
stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s));

/* ================= PLAY ================= */
if(state === "playing"){

  /* BIGGER SHIP */
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.moveTo(ship.x, ship.y - 22);
  ctx.lineTo(ship.x - 14, ship.y + 18);
  ctx.lineTo(ship.x + 14, ship.y + 18);
  ctx.closePath();
  ctx.fill();

  /* FIRE */
  if(holding && fuel > 0){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.moveTo(ship.x, ship.y + 18);
    ctx.lineTo(ship.x - 6, ship.y + 35 + Math.random()*5);
    ctx.lineTo(ship.x + 6, ship.y + 35 + Math.random()*5);
    ctx.fill();
  }

  /* HEAT */
  ctx.fillStyle="gray";
  ctx.fillRect(20, canvas.height/2-100, 20, 200);
  ctx.fillStyle="red";
  ctx.fillRect(20, canvas.height/2+100-(heat*2), 20, heat*2);

  /* FUEL */
  ctx.fillStyle="gray";
  ctx.fillRect(canvas.width-40, canvas.height/2-100, 20, 200);
  ctx.fillStyle="green";
  ctx.fillRect(canvas.width-40, canvas.height/2+100-(fuel/fuelCap)*200, 20,(fuel/fuelCap)*200);

  /* EXPLOSION */
  ctx.fillStyle="orange";
  pieces.forEach(p=>ctx.fillRect(p.x,p.y,6,6));

  /* HUD */
  ctx.fillStyle="white";
  ctx.fillText("Run: $" + runMoney,20,30);
}

/* ================= MENU ================= */
if(state === "menu"){

ctx.textAlign="center";

ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText("SPACE BOOST",canvas.width/2,80);

ctx.font="18px Arial";
ctx.fillText("Money: $" + totalMoney,canvas.width/2,110);

/* upgrades */
drawBox(150,150,"Fuel Capacity",fuelLevel);
drawBox(150,300,"Thrust Power",thrustLevel);
drawBox(canvas.width-350,150,"Money Multiplier",moneyLevel);

}

/* ================= GAME OVER ================= */
if(state === "gameover"){

ctx.textAlign="center";
ctx.fillStyle="white";
ctx.font="30px Arial";

/* SEPARATE END SCREENS */
if(gameOverType === "fuel"){
  ctx.fillText("OUT OF FUEL",canvas.width/2,canvas.height/2);
} else {
  ctx.fillText("SHIP OVERHEATED",canvas.width/2,canvas.height/2);
}

ctx.font="20px Arial";
ctx.fillText("Run Money: $" + runMoney,canvas.width/2,canvas.height/2+40);
ctx.fillText("Click to return to menu",canvas.width/2,canvas.height/2+80);

ctx.fillStyle="orange";
pieces.forEach(p=>ctx.fillRect(p.x,p.y,6,6));
}
}

/* ================= UI BOX ================= */
function drawBox(x,y,title,level){
const w=200,h=120;

ctx.strokeStyle="white";
ctx.strokeRect(x,y,w,h);

ctx.fillStyle="white";
ctx.font="16px Arial";
ctx.fillText(title,x+w/2,y+25);

ctx.fillText("Level "+level+"/5",x+w/2,y+50);

ctx.fillStyle="green";
ctx.fillRect(x+20,y+70,w-40,30);

ctx.fillStyle="black";
ctx.fillText(cost(level)+"$",x+w/2,y+92);
}

/* cost */
function cost(l){
return Math.floor(10*Math.pow(1.8,l));
}

/* click */
window.addEventListener("mousedown",click);

function click(){

if(state === "menu"){
state = "playing";
}

if(state === "gameover"){
reset();
state = "menu";
}
}

/* buy system (unchanged logic) */
function buy(type){

let lvl = type==="fuel"?fuelLevel:type==="thrust"?thrustLevel:moneyLevel;

if(totalMoney < cost(lvl) || lvl>=5){
message="Not enough money";
messageTimer=120;
return;
}

totalMoney -= cost(lvl);

if(type==="fuel"){ fuelLevel++; fuelCap+=20; }
if(type==="thrust"){ thrustLevel++; thrustPower+=0.08; }
if(type==="money"){ moneyLevel++; moneyMulti+=0.5; }
}

/* reset */
function reset(){
ship.x=canvas.width/2;
ship.y=canvas.height/2;
ship.vy=0;

fuel=120;
heat=0;
distance=0;
runMoney=0;
exploded=false;
pieces=[];
}

/* loop */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>
