<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Space Boost</title>
  <style>
    body { margin:0; overflow:hidden; background:black; font-family:Arial; }
    canvas { display:block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------------- STATE ----------------
let state = "menu";
let message = "";
let messageTimer = 0;

// ---------------- PLAYER ----------------
const ship = { x: canvas.width/2, y: canvas.height/2, vy:0, size:20 };

// ---------------- STATS ----------------
let fuel = 100;
let fuelCapLevel = 0;
let thrustLevel = 0;
let moneyMultiLevel = 0;

let fuelCap = 100;
let thrustPower = 0.3;
let moneyMulti = 1;

let money = 0;
let distance = 0;

// ---------------- INPUT ----------------
let holding = false;
window.addEventListener("mousedown", e => { holding = true; handleClick(e); });
window.addEventListener("mouseup", () => holding = false);
window.addEventListener("touchstart", e => { holding = true; handleClick(e.touches[0]); });
window.addEventListener("touchend", () => holding = false);

// ---------------- STARS ----------------
const stars = Array.from({length:200}, () => ({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height*2,
  s: Math.random()*2
}));

// ---------------- GAME ----------------
function update(){
  if(state==="playing"){

    // BOOST (UNCHANGED CORE FEEL)
    if(holding && fuel > 0){
      ship.vy -= thrustPower;
      fuel -= 0.4;
    }

    // GRAVITY
    ship.vy += 0.15;
    ship.vy *= 0.98;
    ship.y += ship.vy;

    // NO FUEL REGEN (IMPORTANT CHANGE)
    fuel = Math.max(0, fuel);

    // DISTANCE + MONEY
    distance += Math.max(0, -ship.vy)*0.05;
    money = Math.floor(distance/10) * moneyMulti;

    // STARS MOVE
    stars.forEach(s=>{
      s.y += 2;
      if(s.y > canvas.height*2) s.y = 0;
    });

    // CRASH
    if(fuel <= 0 || ship.y > canvas.height){
      state = "menu";
      ship.y = canvas.height/2;
    }
  }

  if(messageTimer > 0){
    messageTimer--;
    if(messageTimer === 0) message = "";
  }
}

// ---------------- DRAW ----------------
function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // STARS
  ctx.fillStyle="white";
  stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s));

  if(state==="playing"){
    // SHIP
    ctx.fillStyle="white";
    ctx.fillRect(ship.x-10,ship.y-10,20,20);

    // LEFT BAR (fuel)
    ctx.fillStyle="gray";
    ctx.fillRect(20,canvas.height/2-100,20,200);
    ctx.fillStyle="green";
    ctx.fillRect(20,canvas.height/2+100-(fuel/fuelCap)*200,20,(fuel/fuelCap)*200);

    // HUD
    ctx.fillStyle="white";
    ctx.fillText("Money: $"+money,20,30);
  }

  if(state==="menu"){
    ctx.textAlign="center";

    // MESSAGE
    if(message){
      ctx.globalAlpha = messageTimer/60;
      ctx.fillStyle="red";
      ctx.font="20px Arial";
      ctx.fillText(message,canvas.width/2,60);
      ctx.globalAlpha = 1;
    }

    ctx.fillStyle="white";
    ctx.font="30px Arial";
    ctx.fillText("SPACE BOOST",canvas.width/2,80);

    drawUpgradeBox(150,150,"Fuel Capacity",fuelCapLevel);
    drawUpgradeBox(150,300,"Thrust Speed",thrustLevel);
    drawUpgradeBox(canvas.width-350,150,"Money Multiplier",moneyMultiLevel);
  }
}

// ---------------- UPGRADE BOX ----------------
function drawUpgradeBox(x,y,title,level){
  const w=200,h=120;

  ctx.strokeStyle="white";
  ctx.strokeRect(x,y,w,h);

  ctx.fillStyle="white";
  ctx.font="16px Arial";
  ctx.fillText(title,x+w/2,y+25);
  ctx.fillText("Level: "+level+"/5",x+w/2,y+50);

  // button
  ctx.fillStyle="green";
  ctx.fillRect(x+20,y+70,w-40,30);
  ctx.fillStyle="black";
  ctx.fillText(cost(level)+"$",x+w/2,y+92);
}

// ---------------- COST ----------------
function cost(lvl){
  return Math.floor(10 * Math.pow(1.8,lvl));
}

// ---------------- CLICK ----------------
function handleClick(e){
  if(state==="menu"){
    const x=e.clientX,y=e.clientY;

    if(y>150 && y<270 && x>150 && x<350) buy("fuel");
    if(y>300 && y<420 && x>150 && x<350) buy("thrust");
    if(y>150 && y<270 && x>canvas.width-350 && x<canvas.width-150) buy("money");

    state="playing";
  }
}

// ---------------- BUY ----------------
function buy(type){
  if(type==="fuel"){
    if(money >= cost(fuelCapLevel) && fuelCapLevel<5){
      money -= cost(fuelCapLevel);
      fuelCapLevel++;
      fuelCap += 20;
    } else fail();
  }

  if(type==="thrust"){
    if(money >= cost(thrustLevel) && thrustLevel<5){
      money -= cost(thrustLevel);
      thrustLevel++;
      thrustPower += 0.1;
    } else fail();
  }

  if(type==="money"){
    if(money >= cost(moneyMultiLevel) && moneyMultiLevel<5){
      money -= cost(moneyMultiLevel);
      moneyMultiLevel++;
      moneyMulti += 0.5;
    } else fail();
  }
}

function fail(){
  message="Not enough money";
  messageTimer=120;
}

// ---------------- LOOP ----------------
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
