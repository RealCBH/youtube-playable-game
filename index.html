<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Boost</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ================= STATE ================= */
let state = "menu";
let message = "";
let messageTimer = 0;

/* ================= PLAYER ================= */
const ship = {
  x: canvas.width/2,
  y: canvas.height/2,
  vy: 0
};

/* ================= GAME STATS ================= */
let fuel = 100;
let heat = 0;
let distance = 0;
let money = 0;

/* upgrades */
let fuelLevel = 0;
let thrustLevel = 0;
let moneyLevel = 0;

let fuelCap = 100;
let thrustPower = 0.3;
let moneyMulti = 1;

/* ================= INPUT ================= */
let holding = false;
window.addEventListener("mousedown", () => holding = true);
window.addEventListener("mouseup", () => holding = false);
window.addEventListener("touchstart", () => holding = true);
window.addEventListener("touchend", () => holding = false);

/* ================= BACKGROUND ================= */
const stars = Array.from({length:250}, () => ({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height*2,
  s: Math.random()*2
}));

const planets = [
  {x:300,y:900,r:40,s:0.2},
  {x:900,y:1400,r:60,s:0.15}
];

/* ================= EXPLOSION ================= */
let pieces = [];
let exploded = false;

/* ================= UPDATE ================= */
function update(){

if(state === "playing"){

  /* BOOST */
  if(holding && fuel > 0 && heat < 100){
    ship.vy -= thrustPower;
    fuel -= 0.35;
    heat += 0.9;
  }

  /* COOLING */
  if(!holding){
    heat -= 0.6;
  }

  heat = Math.max(0, Math.min(100, heat));
  fuel = Math.max(0, fuel); // NO REGEN

  /* PHYSICS */
  ship.vy += 0.15;
  ship.vy *= 0.98;
  ship.y += ship.vy;

  /* DISTANCE + MONEY */
  distance += Math.max(0, -ship.vy)*0.05;
  money = Math.floor(distance/10) * moneyMulti;

  /* BACKGROUND MOVE */
  stars.forEach(s=>{
    s.y += 2;
    if(s.y > canvas.height*2) s.y = 0;
  });

  planets.forEach(p=>{
    p.y += 1 + p.s;
    if(p.y > canvas.height*2) p.y = -100;
  });

  /* CRASH CONDITIONS */
  if(fuel <= 0 || heat >= 100 || ship.y > canvas.height){
    explode();
  }
}

/* explosion physics */
pieces.forEach(p=>{
  p.x += p.vx;
  p.y += p.vy;
  p.vy += 0.1;
});

/* message fade */
if(messageTimer > 0){
  messageTimer--;
  if(messageTimer === 0) message = "";
}
}

/* ================= EXPLODE ================= */
function explode(){
if(exploded) return;
exploded = true;
state = "gameover";

for(let i=0;i<6;i++){
  pieces.push({
    x: ship.x,
    y: ship.y,
    vx: (Math.random()-0.5)*7,
    vy: (Math.random()-0.5)*7
  });
}
}

/* ================= DRAW ================= */
function draw(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* stars */
ctx.fillStyle="white";
stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s));

/* planets */
ctx.fillStyle="rgba(100,150,255,0.3)";
planets.forEach(p=>{
  ctx.beginPath();
  ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  ctx.fill();
});

/* ================= PLAYING ================= */
if(state === "playing"){

  /* POINTY SHIP */
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.moveTo(ship.x, ship.y - 15);
  ctx.lineTo(ship.x - 10, ship.y + 10);
  ctx.lineTo(ship.x + 10, ship.y + 10);
  ctx.closePath();
  ctx.fill();

  /* FIRE */
  if(holding && fuel > 0){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.moveTo(ship.x, ship.y + 10);
    ctx.lineTo(ship.x - 5, ship.y + 25 + Math.random()*5);
    ctx.lineTo(ship.x + 5, ship.y + 25 + Math.random()*5);
    ctx.fill();
  }

  /* HUD BARS */

  /* HEAT (left) */
  ctx.fillStyle="gray";
  ctx.fillRect(20, canvas.height/2-100, 20, 200);
  ctx.fillStyle="red";
  ctx.fillRect(20, canvas.height/2+100-(heat*2), 20, heat*2);

  /* FUEL (right) */
  ctx.fillStyle="gray";
  ctx.fillRect(canvas.width-40, canvas.height/2-100, 20, 200);
  ctx.fillStyle="green";
  ctx.fillRect(canvas.width-40, canvas.height/2+100-(fuel/fuelCap)*200, 20,(fuel/fuelCap)*200);

  /* pieces */
  ctx.fillStyle="orange";
  pieces.forEach(p=>{
    ctx.fillRect(p.x,p.y,6,6);
  });
}

/* ================= MENU ================= */
if(state === "menu"){

ctx.textAlign="center";

if(message){
  ctx.globalAlpha = messageTimer/60;
  ctx.fillStyle="red";
  ctx.font="20px Arial";
  ctx.fillText(message,canvas.width/2,60);
  ctx.globalAlpha=1;
}

ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText("SPACE BOOST",canvas.width/2,80);

/* MONEY (MENU ONLY) */
ctx.font="18px Arial";
ctx.fillText("Money: $" + money, canvas.width/2, 110);

/* UPGRADES */
drawBox(150,150,"Fuel Capacity",fuelLevel);
drawBox(150,300,"Thrust Power",thrustLevel);
drawBox(canvas.width-350,150,"Money Multiplier",moneyLevel);
}

/* ================= GAME OVER ================= */
if(state === "gameover"){

ctx.textAlign="center";
ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText("Spaceship Overheated!",canvas.width/2,canvas.height/2);

ctx.font="18px Arial";
ctx.fillText("Money: $" + money,canvas.width/2,canvas.height/2+40);
ctx.fillText("Click to return to menu",canvas.width/2,canvas.height/2+80);

/* explosion pieces stay visible */
ctx.fillStyle="orange";
pieces.forEach(p=>ctx.fillRect(p.x,p.y,6,6));
}
}

/* ================= UI BOX ================= */
function drawBox(x,y,title,level){

const w=200,h=120;

ctx.strokeStyle="white";
ctx.strokeRect(x,y,w,h);

ctx.fillStyle="white";
ctx.font="16px Arial";
ctx.fillText(title,x+w/2,y+25);

ctx.fillText("Level "+level+"/5",x+w/2,y+50);

/* button */
ctx.fillStyle="green";
ctx.fillRect(x+20,y+70,w-40,30);

ctx.fillStyle="black";
ctx.fillText(cost(level)+"$",x+w/2,y+92);
}

/* ================= COST ================= */
function cost(l){
return Math.floor(10*Math.pow(1.8,l));
}

/* ================= CLICK ================= */
window.addEventListener("mousedown",click);

function click(e){

if(state === "menu"){

  const x=e.clientX,y=e.clientY;

  if(y>150 && y<270 && x>150 && x<350) buy("fuel");
  if(y>300 && y<420 && x>150 && x<350) buy("thrust");
  if(y>150 && y<270 && x>canvas.width-350 && x<canvas.width-150) buy("money");

  state="playing";
}

if(state === "gameover"){
  reset();
  state="menu";
}
}

/* ================= BUY ================= */
function buy(type){

let lvl = type==="fuel"?fuelLevel:type==="thrust"?thrustLevel:moneyLevel;

if(money < cost(lvl) || lvl>=5){
  message="Not enough money";
  messageTimer=120;
  return;
}

money -= cost(lvl);

if(type==="fuel"){ fuelLevel++; fuelCap+=20; }
if(type==="thrust"){ thrustLevel++; thrustPower+=0.1; }
if(type==="money"){ moneyLevel++; moneyMulti+=0.5; }
}

/* ================= RESET ================= */
function reset(){
ship.x=canvas.width/2;
ship.y=canvas.height/2;
ship.vy=0;

fuel=100;
heat=0;
distance=0;
exploded=false;
pieces=[];
}

/* ================= LOOP ================= */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
